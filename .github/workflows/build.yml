name: build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build.yml

env:
  IMAGE: docker.io/matrixlab/krea2-comfyui
  VERSION_TAG: cu128-torch280-comfyui-0aecac86-20260714

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION_TAG }}
            ${{ env.IMAGE }}:latest
          provenance: mode=max
          sbom: true

